<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup Wizard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.container{
    width:350px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}
h2{
    margin-bottom:10px;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}
button{
    width:100%;
    padding:12px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#4338ca;
}
.step{
    display:none;
}
.step.active{
    display:block;
}
.interests label{
    display:block;
    margin:5px 0;
}
</style>
</head>
<body>

<div class="container">

    <div class="step active" id="step1">
        <h2>Welcome</h2>
        <p>Enter your name</p>
        <input type="text" id="name" placeholder="Your Name">
        <button onclick="nextStep(1)">Continue</button>
    </div>

    <div class="step" id="step2">
        <h2>Email</h2>
        <input type="email" id="email" placeholder="Email Address">
        <button onclick="nextStep(2)">Continue</button>
    </div>

    <div class="step" id="step3">
        <h2>Password</h2>
        <input type="password" id="password" placeholder="Password">
        <button onclick="nextStep(3)">Continue</button>
    </div>

    <div class="step" id="step4">
        <h2>Select Interests</h2>

        <div class="interests">
            <label><input type="checkbox"> Travel</label>
            <label><input type="checkbox"> Fitness</label>
            <label><input type="checkbox"> Music</label>
            <label><input type="checkbox"> Technology</label>
            <label><input type="checkbox"> Reading</label>
        </div>

        <button onclick="nextStep(4)">Create Account</button>
    </div>

    <div class="step" id="step5">
        <h2>✅ Account Created</h2>
        <p id="welcomeText"></p>
    </div>

</div>

<script>
function nextStep(step){

    document.getElementById("step"+step).classList.remove("active");

    let next = step + 1;

    document.getElementById("step"+next).classList.add("active");

    if(next === 5){
        let name = document.getElementById("name").value;
        document.getElementById("welcomeText").innerHTML =
            "Welcome, <b>" + name + "</b>! Your account is ready.";
    }
}
</script>

</body>
</html>
